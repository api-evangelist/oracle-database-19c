specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle Database 19c
providerId: oracle-database-19c
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Database
  - Enterprise
  - Oracle
  - Long-Term Release
description: Oracle Database 19c is the long-term-release version of Oracle Database. Pricing follows
  the standard Oracle Technology Price List — per-Processor or per-Named-User-Plus across XE, SE2, and
  Enterprise Edition — with separately-licensed Options (Partitioning, Active Data Guard, RAC, etc.)
  and Management Packs (Diagnostics, Tuning, Database Lifecycle Management). 19c is also the supported
  release for Database Cloud Service / Autonomous Database deployments billed per OCPU/ECPU-hour. NUP
  minimums apply (25 NUP per processor on EE). Annual support is typically 22% of license list price.
sources:
  - https://www.oracle.com/database/pricing/
  - https://www.oracle.com/database/technologies/oracle19c.html
plans:
  - id: oracle-database-19c-xe
    name: 19c Express Edition (XE)
    type: freemium
    description: Free, redistributable 19c-derived edition with capacity caps (note that XE typically
      ships from a slightly newer base; included here for completeness).
    entries:
      - label: XE license
        name: xe_license
        type: flat
        metric: install
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Up to 12 GB user data
      - name: Up to 2 GB RAM, 2 CPU threads
  - id: oracle-database-19c-se2
    name: 19c Standard Edition 2
    type: subscription
    description: 19c SE2 perpetual license; 16-thread cap. Per-Processor or per-NUP (10 NUP minimum/server).
    entries:
      - label: SE2 per Processor
        name: se2_processor
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '17500.00'
        userMultiplied: false
      - label: SE2 NUP
        name: se2_nup
        type: subscription
        metric: named_user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '350.00'
        userMultiplied: true
    elements:
      - name: 16-thread capacity cap
      - name: 10 NUP minimum per server
      - name: 22% annual support
  - id: oracle-database-19c-ee
    name: 19c Enterprise Edition
    type: subscription
    description: Flagship 19c edition with full feature catalog. Per-Processor or per-NUP (25 NUP min/processor).
      Options (Partitioning, RAC, Active Data Guard, Multitenant, Spatial/Graph, etc.) sold separately.
    entries:
      - label: EE per Processor
        name: ee_processor
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '47500.00'
        userMultiplied: false
      - label: EE NUP
        name: ee_nup
        type: subscription
        metric: named_user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '950.00'
        userMultiplied: true
      - label: EE annual support
        name: ee_support
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: ~22% of license
        userMultiplied: false
    elements:
      - name: 25 NUP minimum per processor
      - name: Options (Partitioning, RAC, ADG, Multitenant) sold separately
      - name: Long-Term Support release
  - id: oracle-database-19c-options
    name: 19c EE Options (Add-on)
    type: subscription
    description: Per-Processor / per-NUP add-on options that extend Enterprise Edition. Each option requires
      EE on the same servers/users.
    entries:
      - label: Partitioning per Processor
        name: opt_partitioning
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '11500.00'
        userMultiplied: false
      - label: Real Application Clusters (RAC) per Processor
        name: opt_rac
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '23000.00'
        userMultiplied: false
      - label: Active Data Guard per Processor
        name: opt_adg
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '11500.00'
        userMultiplied: false
      - label: Multitenant per Processor
        name: opt_multitenant
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '17500.00'
        userMultiplied: false
    elements:
      - name: Each option requires EE on same hosts
      - name: 22% annual support per option
  - id: oracle-database-19c-cloud
    name: 19c on Database Cloud Service / Autonomous (OCI)
    type: usage-based
    description: 19c is the supported long-term release for OCI managed services; bill per OCPU/ECPU-hour
      with license-included or BYOL.
    entries:
      - label: Cloud DB OCPU
        name: cloud_ocpu
        type: metered
        metric: OCPU-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/cloud/price-list/
        userMultiplied: false
    elements:
      - name: License-included or BYOL
      - name: Patching, backup, HA managed
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

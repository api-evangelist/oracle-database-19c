naftiko: 1.0.0-alpha2
info:
  label: Oracle Database 19c - Oracle REST Data Services (ORDS) API — SQL
  description: 'Oracle Database 19c - Oracle REST Data Services (ORDS) API — SQL. 1 operations. Lead operation: Execute SQL.
    Self-contained Naftiko capability covering one Oracle Database 19c business surface.'
  tags:
  - Oracle Database 19c
  - SQL
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_DATABASE_19C_API_KEY: ORACLE_DATABASE_19C_API_KEY
capability:
  consumes:
  - type: http
    namespace: ords-sql
    baseUri: https://{host}:{port}/ords
    description: Oracle Database 19c - Oracle REST Data Services (ORDS) API — SQL business capability. Self-contained, no
      shared references.
    resources:
    - name: schema-_-sql
      path: /{schema}/_/sql
      operations:
      - name: executesql
        method: POST
        description: Execute SQL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ORACLE_DATABASE_19C_API_KEY}}'
  exposes:
  - type: rest
    namespace: ords-sql-rest
    port: 8080
    description: REST adapter for Oracle Database 19c - Oracle REST Data Services (ORDS) API — SQL. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/{schema}//sql
      name: schema-sql
      description: REST surface for schema-_-sql.
      operations:
      - method: POST
        name: executesql
        description: Execute SQL
        call: ords-sql.executesql
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ords-sql-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Database 19c - Oracle REST Data Services (ORDS) API — SQL. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: execute-sql
      description: Execute SQL
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ords-sql.executesql
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

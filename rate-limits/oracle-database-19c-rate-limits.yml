specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Oracle Database 19c
providerId: oracle-database-19c
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Database
  - Oracle
  - Rate Limiting
notes: 19c is on-prem / cloud-deployed software. Throughput is bounded by licensed processor count, Resource
  Manager, and ORDS pool sizing. There are no upstream-published numeric request rates.
description: Oracle Database 19c throughput is operator-controlled via Database Resource Manager, session
  resource limits, and (for REST) ORDS pool configuration. Cloud-managed 19c (Autonomous DB, Base Database
  Service) inherits OCI throttling — 429 / 503 with Retry-After.
sources:
  - https://docs.oracle.com/en/database/oracle/oracle-database/19/
  - https://docs.oracle.com/en/database/oracle/oracle-rest-data-services/
responseCodes:
  throttled: 429
  unavailable: 503
  conflict: 409
limits:
  - name: Database Resource Manager
    scope: database/consumer-group
    metric: varies
    limit: configured per consumer group
  - name: Session resource limits
    scope: session
    metric: varies
    limit: SESSIONS_PER_USER, CPU_PER_SESSION (operator-set)
  - name: ORDS connection pool
    scope: ORDS instance
    metric: concurrent_connections
    limit: jdbc.MaxLimit (operator-set)
  - name: Autonomous Database 19c
    scope: instance
    metric: ECPU
    limit: instance-shape-bounded
policies:
  - name: Resource Manager
    description: Primary throughput-shaping mechanism — allocate CPU / IO / parallelism per consumer
      group.
  - name: ORDS tuning
    description: Size connection pool to match expected concurrency for REST endpoints.
  - name: Backoff
    description: Honor 429 / 503 from cloud services; ORA- errors handled with application-level retry.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

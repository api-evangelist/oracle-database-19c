description: 'FOCUS-aligned FinOps for Oracle Database 19c (long-term-release): perpetual per-Processor
  or per-NUP licenses with 22% annual support, separately-licensed Options (Partitioning, RAC, ADG, Multitenant)
  and Management Packs, plus per-OCPU/ECPU-hour cloud-managed variants on OCI (license-included or BYOL).
  19c specifically is the long-term-supported release used for many large estates.'

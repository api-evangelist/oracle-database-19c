principles:
  - name: Visibility
    description: Maintain a CSI/contract-to-deployment register for 19c hosts and their EE Options; reconcile
      with Oracle LMS data. For OCI, use Cost Analysis to track Database / Autonomous Database consumption.
  - name: Allocation
    description: Tag each 19c host and OCI Database Cloud instance with environment + business-unit metadata;
      enforce via OCI compartments.
  - name: Optimization
    description: Use Multitenant to consolidate many PDBs onto fewer EE-licensed CDBs; convert under-utilized
      perpetual licenses to BYOL on OCI; eliminate unused Options and Management Packs (each carries
      22% support).
  - name: Accountability
    description: License-management owner tracks 19c estate and Options counts; finance owns annual support
      renewal. Cloud DB consumption reviewed monthly against forecast.
